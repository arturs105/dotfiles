set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Highlight windows that have new output (useful for tracking Claude Code activity)
#set -g monitor-activity on
#set -g visual-activity off

set -g mouse on

set -g mode-keys vi

# New panes open in the same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'

# Nord theme disabled — designed for dark backgrounds, clashes with light terminal
# set -g @plugin "arcticicestudio/nord-tmux"

# Light theme
set -g status-style "bg=colour254,fg=colour235"
set -g status-left "#{?client_prefix,#[bg=colour208#,fg=colour255#,bold] #S #[bg=colour254#,fg=colour208] ,#[bg=colour67#,fg=colour255#,bold] #S #[bg=colour254#,fg=colour67] }"
set -g status-right "#[fg=colour241]%H:%M #[fg=colour67,bold]#h "
set -g status-left-length 30
set -g window-status-format "#{?@claude_attention,#[fg=colour208#,bold] #I:#W! , #[fg=colour241]#I:#W }"
set -g window-status-current-format "#{?@claude_attention,#[bg=colour67#,fg=colour208#,bold] #I:#W! ,#[bg=colour67#,fg=colour255#,bold] #I:#W }"
set -g window-status-separator ""
set -g pane-border-style "fg=colour250"
set -g pane-active-border-style "fg=colour67"
set -g pane-border-lines heavy
set -g window-style "bg=colour253"
set -g window-active-style "bg=#ffffff"
set -g message-style "bg=colour67,fg=colour255"
set -g mode-style "bg=colour67,fg=colour255"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# Highlight windows that have new output (useful for tracking Claude Code activity)
#set -g monitor-activity on
#set -g visual-activity off

set -g mouse on
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode    WheelUpPane   select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode    WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

bind Up copy-mode

set -g mode-keys vi

# New panes open in the same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf'

# Nord theme disabled — designed for dark backgrounds, clashes with light terminal
# set -g @plugin "arcticicestudio/nord-tmux"

# Light theme
set -g status-style "bg=colour254,fg=colour235"
set -g status-left "#{?client_prefix,#[bg=colour208#,fg=colour255#,bold] #S #[bg=colour254#,fg=colour208] ,#[bg=colour67#,fg=colour255#,bold] #S #[bg=colour254#,fg=colour67] }"
set -g status-right "#[fg=colour241]%H:%M #[fg=colour67,bold]#h "
set -g status-left-length 30
# @attention: per-window user option that drives the status-bar colour. Any script
# (Claude Code hooks, device-run.sh, …) writes a value; the format strings below
# pick a style for it. `prefix + e` clears it on the current window.
#   1     = needs permission (orange !)         — Claude blocked on user decision
#   2     = idle / awaiting input (green ?)     — Claude turn ended, or any script "done"
#   blue  = work in progress                    — e.g. device-run.sh build/install/launch
#   red   = blocked, waiting on external state  — e.g. device-run.sh waiting for device lock
#   green = running on external target          — e.g. device-run.sh app live on device
set -g window-status-format "#{?#{==:#{@attention},1},#[fg=colour208#,bold] #I:#W! ,#{?#{==:#{@attention},2},#[fg=colour34#,bold] #I:#W? ,#{?#{==:#{@attention},blue},#[bg=colour33#,fg=colour255#,bold] #I:#W ,#{?#{==:#{@attention},red},#[bg=colour196#,fg=colour255#,bold] #I:#W ,#{?#{==:#{@attention},green},#[bg=colour40#,fg=colour255#,bold] #I:#W , #[fg=colour241]#I:#W }}}}}"
set -g window-status-current-format "#{?#{==:#{@attention},1},#[bg=colour67#,fg=colour208#,bold] #I:#W! ,#{?#{==:#{@attention},2},#[bg=colour67#,fg=colour48#,bold] #I:#W? ,#{?#{==:#{@attention},blue},#[bg=colour67] #[bg=colour33#,fg=colour255#,bold]#I:#W ,#{?#{==:#{@attention},red},#[bg=colour67] #[bg=colour196#,fg=colour255#,bold]#I:#W ,#{?#{==:#{@attention},green},#[bg=colour67] #[bg=colour40#,fg=colour255#,bold]#I:#W ,#[bg=colour67#,fg=colour255#,bold] #I:#W }}}}}"
set -g window-status-separator ""
# Clear the attention colour on the current window (prefix + e = erase).
# Also unsets per-window status overrides — older device-run.sh versions set these directly.
bind e \
    set-option -w -u @attention \;\
    set-option -w -u window-status-style \;\
    set-option -w -u window-status-current-style \;\
    set-option -w -u window-status-format \;\
    set-option -w -u window-status-current-format \;\
    display-message "attention cleared"
# Mark the current window idle/green (prefix + g = green)
bind g set-option -w @attention 2 \; display-message "marked idle (green)"
# Spawn a new worktree+claude tmux window (prefix + W = Worktree).
# Works regardless of what the current pane is running — invokes the script
# directly via run-shell. Avoid `'` (apostrophe) in the prompt; other chars OK.
bind W command-prompt -p "branch:,prompt:" "run-shell '$HOME/.bin/gwt-tmux \"%1\" \"%2\"'"
# Remove the worktree for the current window and close it (prefix + R = Remove).
# Uses the tmux window name as the branch (set by gwt). Confirms first.
bind R confirm-before -p "remove worktree '#W' and close window? (y/n) " "run-shell '$HOME/.bin/gwtrm-tmux \"#W\" \"#{window_id}\"'"
set -g pane-border-style "fg=colour250"
set -g pane-active-border-style "fg=colour67"
set -g pane-border-lines heavy
set -g window-style "bg=colour253"
set -g window-active-style "bg=#ffffff"
set -g message-style "bg=colour67,fg=colour255"
set -g mode-style "bg=colour67,fg=colour255"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
